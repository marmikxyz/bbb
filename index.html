<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Ranaji Quiz</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{

background:#0d1117;

color:white;

}

header{

display:flex;

justify-content:space-between;

align-items:center;

padding:18px 30px;

background:#161b22;

border-bottom:1px solid #30363d;

position:sticky;

top:0;

z-index:100;

}

.logo{

font-size:28px;

font-weight:bold;

color:#58a6ff;

}

.search{

display:flex;

gap:10px;

}

.search input{

width:350px;

padding:12px;

border:none;

outline:none;

border-radius:8px;

background:#21262d;

color:white;

}

.adminBtn{

background:#238636;

color:white;

border:none;

padding:10px 18px;

border-radius:8px;

cursor:pointer;

}

.hero{

padding:60px;

text-align:center;

}

.hero h1{

font-size:50px;

margin-bottom:10px;

}

.hero p{

opacity:.8;

}

.filters{

display:flex;

gap:10px;

justify-content:center;

margin-bottom:40px;

flex-wrap:wrap;

}

.filter{

padding:10px 20px;

background:#21262d;

border-radius:25px;

cursor:pointer;

}

.filter:hover{

background:#30363d;

}

.grid{

display:grid;

grid-template-columns:repeat(auto-fill,minmax(300px,1fr));

gap:25px;

padding:25px;

}

.card{

background:#161b22;

border-radius:15px;

overflow:hidden;

cursor:pointer;

transition:.3s;

border:1px solid #30363d;

}

.card:hover{

transform:translateY(-6px);

}

.thumb{

height:180px;

background:linear-gradient(135deg,#238636,#58a6ff);

display:flex;

justify-content:center;

align-items:center;

font-size:70px;

}

.content{

padding:20px;

}

.title{

font-size:22px;

font-weight:600;

margin-bottom:10px;

}

.meta{

display:flex;

justify-content:space-between;

font-size:14px;

opacity:.7;

margin-top:10px;

}

.start{

margin-top:20px;

width:100%;

padding:12px;

background:#238636;

color:white;

border:none;

border-radius:8px;

cursor:pointer;

}

.start:hover{

background:#2ea043;

}

/* Quiz */

.overlay{

position:fixed;

left:0;

top:0;

width:100%;

height:100%;

background:rgba(0,0,0,.8);

display:none;

justify-content:center;

align-items:center;

z-index:999;

}

.modal{

width:900px;

max-width:95%;

background:#161b22;

border-radius:12px;

padding:25px;

}

.questionNo{

font-size:18px;

margin-bottom:20px;

}

.timer{

float:right;

color:#58a6ff;

}

.question{

font-size:24px;

margin-bottom:25px;

}

.option{

padding:15px;

background:#21262d;

margin-bottom:12px;

border-radius:8px;

cursor:pointer;

}

.option:hover{

background:#30363d;

}

.nav{

display:flex;

justify-content:space-between;

margin-top:30px;

}

.nav button{

padding:12px 20px;

border:none;

border-radius:8px;

cursor:pointer;

}

.prev{

background:#30363d;

color:white;

}

.next{

background:#238636;

color:white;

}

.submit{

background:#d29922;

color:white;

}

/* Result */

.result{

display:none;

text-align:center;

}

.result h2{

font-size:35px;

margin-bottom:20px;

}

.score{

font-size:60px;

color:#58a6ff;

margin:20px;

}

.close{

background:#238636;

color:white;

padding:12px 25px;

border:none;

border-radius:8px;

cursor:pointer;

}

</style>

</head>

<body>

<header>

<div class="logo">

Ranaji Quiz

</div>

<div class="search">

<input
id="search"
placeholder="Search quiz...">

<button
class="adminBtn">

⚙ Admin

</button>

</div>

</header>

<section class="hero">

<h1>

SSC Mock Tests

</h1>

<p>

Practice Unlimited Questions

</p>

</section>

<div class="filters">

<div class="filter">All</div>

<div class="filter">Reasoning</div>

<div class="filter">English</div>

<div class="filter">Math</div>

<div class="filter">GK</div>

<div class="filter">Current Affairs</div>

</div>

<div
id="quizGrid"
class="grid">

</div>

<!-- Quiz Modal -->

<div
class="overlay"
id="quizModal">

<div class="modal">

<div class="questionNo">

Question

<span id="currentQuestion">

1

</span>

/

<span id="totalQuestion">

100

</span>

<span
class="timer"
id="timer">

60:00

</span>

</div>

<div
class="question"
id="question">

Question

</div>

<div id="options">

</div>

<div class="nav">

<button
class="prev">

Previous

</button>

<div>

<button
class="submit">

Submit

</button>

<button
class="next">

Next

</button>

</div>

</div>

</div>

</div>

<!-- Result -->

<div
class="overlay"
id="resultModal">

<div class="modal result">

<h2>

Quiz Result

</h2>

<div
class="score"
id="score">

0

</div>

<p
id="resultText">

</p>

<br>

<button
class="close">

Close

</button>

</div>

</div>
<!-- ===========================
     ADMIN PANEL
=========================== -->

<div class="overlay" id="adminModal">

<div class="modal">

<h2 style="margin-bottom:20px;">
⚙️ Admin Panel
</h2>

<div style="display:grid;gap:15px;">

<input
id="quizTitle"
placeholder="Quiz Title"
style="padding:12px;background:#21262d;border:none;border-radius:8px;color:white;">

<input
id="quizCategory"
placeholder="Category (Reasoning / Math)"
style="padding:12px;background:#21262d;border:none;border-radius:8px;color:white;">

<input
id="quizDuration"
type="number"
placeholder="Duration (Minutes)"
style="padding:12px;background:#21262d;border:none;border-radius:8px;color:white;">

<input
id="quizNegative"
type="number"
step="0.25"
placeholder="Negative Marking"
style="padding:12px;background:#21262d;border:none;border-radius:8px;color:white;">

<div
style="
border:2px dashed #444;
padding:40px;
text-align:center;
border-radius:10px;
cursor:pointer;
">

<h3>Upload Quiz JSON</h3>

<p>Select or Drag & Drop JSON</p>

<input
type="file"
id="jsonFile"
accept=".json"
style="margin-top:20px;">

</div>

<button
id="saveQuiz"
style="
padding:15px;
background:#238636;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-size:18px;
">

Import Quiz

</button>

<button
id="closeAdmin"
style="
padding:15px;
background:#30363d;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
">

Close

</button>

</div>

</div>

</div>

<script>

const STORAGE_KEY="ranaji_quiz_storage";

let quizzes=[];

let currentQuiz=null;

let currentQuestion=0;

let answers=[];

let timerInterval=null;

function loadStorage(){

const raw=localStorage.getItem(STORAGE_KEY);

if(raw){

quizzes=JSON.parse(raw);

}else{

quizzes=[];

}

}

function saveStorage(){

localStorage.setItem(

STORAGE_KEY,

JSON.stringify(quizzes)

);

}

function renderCards(){

const grid=document.getElementById("quizGrid");

grid.innerHTML="";

if(quizzes.length===0){

grid.innerHTML=`

<div style="

grid-column:1/-1;

text-align:center;

padding:100px;

opacity:.7;

">

<h2>

No Quiz Available

</h2>

<p>

Open Admin Panel and upload JSON.

</p>

</div>

`;

return;

}

quizzes.forEach((quiz,index)=>{

const card=document.createElement("div");

card.className="card";

card.innerHTML=`

<div class="thumb">

📝

</div>

<div class="content">

<div class="title">

${quiz.title}

</div>

<div class="meta">

<span>

${quiz.category}

</span>

<span>

${quiz.questions.length} Questions

</span>

</div>

<div class="meta">

<span>

${quiz.duration} Min

</span>

<span>

-${quiz.negative_marking}

</span>

</div>

<button

class="start"

onclick="startQuiz(${index})"

>

Start Quiz

</button>

</div>

`;

grid.appendChild(card);

});

}

loadStorage();

renderCards();
  // ===========================
// ADMIN EVENTS
// ===========================

document.querySelector(".adminBtn").onclick=function(){

document.getElementById("adminModal").style.display="flex";

}

document.getElementById("closeAdmin").onclick=function(){

document.getElementById("adminModal").style.display="none";

}


// ===========================
// IMPORT JSON
// ===========================

document.getElementById("saveQuiz").onclick=function(){

const file=document.getElementById("jsonFile").files[0];

if(!file){

alert("Select JSON File");

return;

}

const reader=new FileReader();

reader.onload=function(e){

try{

const quiz=JSON.parse(e.target.result);

if(!quiz.questions){

alert("Invalid Quiz");

return;

}

// prevent duplicate title

quizzes=quizzes.filter(

q=>q.title!==quiz.title

);

quizzes.push(quiz);

saveStorage();

renderCards();

alert("Quiz Imported Successfully");

document.getElementById("adminModal").style.display="none";

}catch(err){

alert("Invalid JSON");

}

}

reader.readAsText(file);

}



// ===========================
// START QUIZ
// ===========================

function startQuiz(index){

currentQuiz=quizzes[index];

currentQuestion=0;

answers=new Array(

currentQuiz.questions.length

).fill(null);

document.getElementById("quizModal").style.display="flex";

startTimer();

loadQuestion();

}



// ===========================
// LOAD QUESTION
// ===========================

function loadQuestion(){

const q=currentQuiz.questions[currentQuestion];

document.getElementById("currentQuestion").innerText=currentQuestion+1;

document.getElementById("totalQuestion").innerText=currentQuiz.questions.length;

document.getElementById("question").innerHTML=q.question;

const optionBox=document.getElementById("options");

optionBox.innerHTML="";

q.options.forEach((option,index)=>{

const div=document.createElement("div");

div.className="option";

if(answers[currentQuestion]===index){

div.style.border="2px solid #58a6ff";

}

div.innerHTML=option;

div.onclick=function(){

answers[currentQuestion]=index;

loadQuestion();

}

optionBox.appendChild(div);

});

}



// ===========================
// NEXT
// ===========================

document.querySelector(".next").onclick=function(){

if(currentQuestion<currentQuiz.questions.length-1){

currentQuestion++;

loadQuestion();

}

}



// ===========================
// PREVIOUS
// ===========================

document.querySelector(".prev").onclick=function(){

if(currentQuestion>0){

currentQuestion--;

loadQuestion();

}

}



// ===========================
// SEARCH
// ===========================

document.getElementById("search").onkeyup=function(){

const value=this.value.toLowerCase();

const cards=document.querySelectorAll(".card");

cards.forEach(card=>{

const title=card.querySelector(".title").innerText.toLowerCase();

if(title.includes(value)){

card.style.display="block";

}else{

card.style.display="none";

}

});

}



// ===========================
// CATEGORY FILTER
// ===========================

document.querySelectorAll(".filter").forEach(btn=>{

btn.onclick=function(){

const category=this.innerText;

const cards=document.querySelectorAll(".card");

cards.forEach((card,index)=>{

if(category==="All"){

card.style.display="block";

return;

}

if(

quizzes[index].category===category

){

card.style.display="block";

}else{

card.style.display="none";

}

});

}

});
  // ===========================
// TIMER
// ===========================

let timeLeft = 0;

function startTimer(){

clearInterval(timerInterval);

timeLeft = currentQuiz.duration * 60;

updateTimer();

timerInterval = setInterval(()=>{

timeLeft--;

updateTimer();

if(timeLeft<=0){

clearInterval(timerInterval);

submitQuiz();

}

},1000);

}

function updateTimer(){

let m=Math.floor(timeLeft/60);

let s=timeLeft%60;

document.getElementById("timer").innerHTML=

String(m).padStart(2,"0")+":"+

String(s).padStart(2,"0");

}



// ===========================
// SUBMIT
// ===========================

document.querySelector(".submit").onclick=function(){

submitQuiz();

};

function submitQuiz(){

clearInterval(timerInterval);

let correct=0;

let wrong=0;

let skipped=0;

let score=0;

currentQuiz.questions.forEach((q,index)=>{

if(answers[index]===null){

skipped++;

return;

}

if(answers[index]===q.answer){

correct++;

score++;

}else{

wrong++;

score-=currentQuiz.negative_marking;

}

});

document.getElementById("quizModal").style.display="none";

document.getElementById("resultModal").style.display="flex";

document.getElementById("score").innerHTML=score;

let accuracy=0;

if(currentQuiz.questions.length>0){

accuracy=((correct/currentQuiz.questions.length)*100).toFixed(1);

}

document.getElementById("resultText").innerHTML=`

Correct : <b>${correct}</b><br><br>

Wrong : <b>${wrong}</b><br><br>

Skipped : <b>${skipped}</b><br><br>

Accuracy : <b>${accuracy}%</b>

`;

}



// ===========================
// CLOSE RESULT
// ===========================

document.querySelector(".close").onclick=function(){

document.getElementById("resultModal").style.display="none";

};



// ===========================
// CLOSE MODAL ON BACKGROUND
// ===========================

document.querySelectorAll(".overlay").forEach(o=>{

o.onclick=function(e){

if(e.target===o){

o.style.display="none";

clearInterval(timerInterval);

}

};

});



// ===========================
// ESC KEY
// ===========================

document.addEventListener("keydown",function(e){

if(e.key==="Escape"){

document.getElementById("quizModal").style.display="none";

document.getElementById("resultModal").style.display="none";

document.getElementById("adminModal").style.display="none";

clearInterval(timerInterval);

}

});



// ===========================
// SAMPLE QUIZ (ONLY FIRST RUN)
// ===========================

if(quizzes.length===0){

quizzes.push({

title:"Demo Quiz",

category:"Reasoning",

duration:5,

negative_marking:0.5,

questions:[

{

question:"2 + 2 = ?",

options:["2","3","4","5"],

answer:2

},

{

question:"Capital of India?",

options:["Mumbai","Delhi","Kolkata","Chennai"],

answer:1

},

{

question:"5 × 6 = ?",

options:["20","25","30","35"],

answer:2

}

]

});

saveStorage();

renderCards();

}

</script>

</body>

</html>
