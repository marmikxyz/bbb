<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ranaji Stream</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #080810;
      --surface: #10101a;
      --card: #14141e;
      --border: #1f1f30;
      --accent: #e63946;
      --blue: #229ED9;
      --gold: #f4a261;
      --text: #f0edf6;
      --muted: #666680;
      --green: #2ec27e;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
    }

    body::before {
      content:'';
      position:fixed; inset:0;
      background:
        radial-gradient(ellipse 70% 40% at 15% 5%, rgba(230,57,70,.07) 0%, transparent 60%),
        radial-gradient(ellipse 50% 50% at 85% 95%, rgba(34,158,217,.05) 0%, transparent 60%);
      pointer-events:none; z-index:0;
    }

    /* ══ HEADER ══ */
    header {
      position:relative; z-index:10;
      background: rgba(8,8,16,.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      display:flex; align-items:center; gap:1rem;
    }
    .logo {
      font-family:'Bebas Neue',sans-serif;
      font-size:1.8rem; letter-spacing:3px;
      background:linear-gradient(135deg,var(--accent),var(--gold));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    }
    .header-right { margin-left:auto; display:flex; gap:.75rem; align-items:center; }
    .btn-small {
      padding:.45rem 1rem; border-radius:7px; font-size:.8rem; font-weight:500;
      cursor:pointer; border:none; font-family:'DM Sans',sans-serif; transition:.2s;
    }
    .btn-admin { background:var(--surface); color:var(--muted); border:1px solid var(--border); }
    .btn-admin:hover { color:var(--text); border-color:var(--muted); }
    .count-badge {
      background:var(--accent); color:#fff; font-size:.72rem;
      padding:2px 8px; border-radius:20px; font-weight:600;
    }

    /* ══ PAGES ══ */
    .page { display:none; position:relative; z-index:1; }
    .page.active { display:block; }

    /* ══ HOME ══ */
    #home { padding: 2.5rem 2rem; max-width:1200px; margin:0 auto; }

    .hero {
      text-align:center; padding:3rem 1rem 2.5rem;
    }
    .hero h1 {
      font-family:'Bebas Neue',sans-serif; font-size:3.5rem;
      letter-spacing:4px; margin-bottom:.5rem;
    }
    .hero p { color:var(--muted); font-size:1rem; }

    /* Empty state */
    .empty-state {
      text-align:center; padding:5rem 2rem;
      border: 1px dashed var(--border); border-radius:16px;
      margin-top:1rem;
    }
    .empty-state .icon { font-size:3.5rem; margin-bottom:1rem; opacity:.5; }
    .empty-state h3 { font-size:1.2rem; margin-bottom:.5rem; color:var(--muted); }
    .empty-state p { color:var(--muted); font-size:.85rem; line-height:1.7; }

    /* Grid */
    .grid {
      display:grid;
      grid-template-columns: repeat(auto-fill, minmax(300px,1fr));
      gap:1.25rem;
      margin-top:2rem;
    }

    .card {
      background:var(--card);
      border:1px solid var(--border);
      border-radius:12px;
      overflow:hidden;
      cursor:pointer;
      transition: transform .2s, border-color .2s, box-shadow .2s;
    }
    .card:hover {
      transform:translateY(-3px);
      border-color:#2a2a40;
      box-shadow:0 12px 40px rgba(0,0,0,.5);
    }

    .card-thumb {
      width:100%; aspect-ratio:16/9;
      background:var(--surface);
      position:relative; overflow:hidden;
      display:flex; align-items:center; justify-content:center;
    }
    .card-thumb img { width:100%; height:100%; object-fit:cover; }
    .card-thumb .type-icon {
      font-size:2.5rem; opacity:.4;
    }
    .card-thumb .play-btn {
      position:absolute; inset:0;
      display:flex; align-items:center; justify-content:center;
      background:rgba(0,0,0,.4);
      font-size:2.5rem;
      opacity:0; transition:.2s;
    }
    .card:hover .play-btn { opacity:1; }

    .card-type-badge {
      position:absolute; top:.5rem; left:.5rem;
      font-size:.65rem; font-weight:700; letter-spacing:1px;
      padding:3px 8px; border-radius:5px;
      text-transform:uppercase;
    }
    .badge-video { background:var(--accent); color:#fff; }
    .badge-pdf   { background:#e67e22; color:#fff; }
    .badge-photo { background:#8e44ad; color:#fff; }
    .badge-document { background:#2980b9; color:#fff; }

    .card-body { padding:1rem; }
    .card-title {
      font-size:.9rem; font-weight:500; line-height:1.4;
      display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;
      overflow:hidden; margin-bottom:.5rem;
    }
    .card-meta {
      font-size:.75rem; color:var(--muted);
      display:flex; gap:.75rem; align-items:center; flex-wrap:wrap;
    }

    /* ══ MODAL ══ */
    .modal-overlay {
      display:none; position:fixed; inset:0; z-index:1000;
      background:rgba(0,0,0,.85); backdrop-filter:blur(8px);
      align-items:center; justify-content:center; padding:1rem;
    }
    .modal-overlay.open { display:flex; }

    .modal {
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:16px;
      width:100%; max-width:900px;
      max-height:92vh; overflow-y:auto;
      animation:modalIn .25s ease;
    }
    @keyframes modalIn {
      from { opacity:0; transform:scale(.96) translateY(10px); }
      to   { opacity:1; transform:scale(1) translateY(0); }
    }

    .modal-header {
      padding:1.2rem 1.5rem;
      border-bottom:1px solid var(--border);
      display:flex; align-items:flex-start; gap:1rem;
    }
    .modal-title { font-size:1rem; font-weight:500; line-height:1.5; flex:1; }
    .modal-close {
      background:none; border:none; color:var(--muted);
      font-size:1.5rem; cursor:pointer; padding:.2rem .5rem;
      transition:.2s; line-height:1;
    }
    .modal-close:hover { color:var(--text); }

    .modal-body { padding:1.5rem; }

    /* Video player */
    .player-wrap {
      background:#000; border-radius:10px; overflow:hidden;
      border:1px solid var(--border);
    }
    .player-wrap video {
      width:100%; display:block;
      max-height:65vh;
    }
    .player-wrap iframe {
      width:100%; aspect-ratio:16/9; border:none; display:block;
    }

    /* PDF viewer */
    .pdf-viewer {
      border-radius:10px; overflow:hidden;
      border:1px solid var(--border);
    }
    .pdf-viewer iframe {
      width:100%; height:70vh; border:none; display:block;
      background:#fff;
    }

    .media-error {
      background:rgba(230,57,70,.1); border:1px solid rgba(230,57,70,.2);
      border-radius:10px; padding:2rem; text-align:center;
    }
    .media-error p { color:var(--muted); font-size:.9rem; line-height:1.7; }

    .modal-meta {
      margin-top:1rem;
      background:var(--card); border:1px solid var(--border);
      border-radius:10px; padding:1rem 1.2rem;
      display:flex; align-items:center; justify-content:space-between;
      flex-wrap:wrap; gap:.75rem;
    }
    .modal-meta-info { font-size:.82rem; color:var(--muted); line-height:1.6; }
    .modal-meta-info strong { color:var(--text); }

    .btn-tg {
      display:inline-flex; align-items:center; gap:.4rem;
      background:var(--blue); color:#fff;
      padding:.5rem 1.1rem; border-radius:7px;
      font-size:.82rem; font-weight:500; text-decoration:none;
      border:none; cursor:pointer; font-family:'DM Sans',sans-serif;
      transition:.2s;
    }
    .btn-tg:hover { opacity:.85; }

    /* ══ ADMIN PANEL ══ */
    #admin {
      padding:2rem;
      max-width:800px; margin:0 auto;
    }

    .admin-header {
      display:flex; align-items:center; gap:1rem; margin-bottom:2rem;
    }
    .admin-header h2 {
      font-family:'Bebas Neue',sans-serif; font-size:1.8rem; letter-spacing:2px;
    }
    .back-btn {
      background:var(--surface); border:1px solid var(--border);
      color:var(--muted); padding:.4rem .9rem; border-radius:7px;
      cursor:pointer; font-size:.82rem; font-family:'DM Sans',sans-serif;
      transition:.2s;
    }
    .back-btn:hover { color:var(--text); }

    .upload-zone {
      border:2px dashed var(--border);
      border-radius:14px;
      padding:3rem 2rem;
      text-align:center;
      cursor:pointer;
      transition:.25s;
      position:relative;
    }
    .upload-zone:hover, .upload-zone.dragover {
      border-color:var(--accent);
      background:rgba(230,57,70,.05);
    }
    .upload-zone .uz-icon { font-size:3rem; margin-bottom:1rem; }
    .upload-zone h3 { margin-bottom:.5rem; }
    .upload-zone p { color:var(--muted); font-size:.85rem; }
    .upload-zone input[type=file] {
      position:absolute; inset:0; opacity:0; cursor:pointer;
    }

    .uploaded-list { margin-top:2rem; }
    .uploaded-list h3 {
      font-size:1rem; font-weight:600; margin-bottom:1rem;
      color:var(--muted); text-transform:uppercase; letter-spacing:1px; font-size:.78rem;
    }

    .json-item {
      background:var(--card); border:1px solid var(--border);
      border-radius:10px; padding:.9rem 1.2rem;
      margin-bottom:.6rem;
      display:flex; align-items:center; gap:.75rem;
      animation:fadeIn .3s ease;
    }
    @keyframes fadeIn {
      from { opacity:0; transform:translateY(6px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .json-item .ji-icon {
      width:36px; height:36px; border-radius:8px;
      display:flex; align-items:center; justify-content:center;
      font-size:1.1rem; flex-shrink:0;
    }
    .ji-video  { background:rgba(230,57,70,.2); }
    .ji-pdf    { background:rgba(230,126,34,.2); }
    .ji-photo  { background:rgba(142,68,173,.2); }
    .ji-doc    { background:rgba(41,128,185,.2); }

    .ji-info { flex:1; min-width:0; }
    .ji-title { font-size:.88rem; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .ji-sub   { font-size:.75rem; color:var(--muted); margin-top:2px; }

    .ji-actions { display:flex; gap:.5rem; flex-shrink:0; }
    .ji-del {
      background:rgba(230,57,70,.1); border:1px solid rgba(230,57,70,.2);
      color:var(--accent); padding:.3rem .7rem; border-radius:6px;
      font-size:.75rem; cursor:pointer; font-family:'DM Sans',sans-serif;
      transition:.2s;
    }
    .ji-del:hover { background:rgba(230,57,70,.2); }

    .save-bar {
      position:fixed; bottom:1.5rem; right:1.5rem;
      display:flex; gap:.75rem; z-index:100;
    }
    .btn-save {
      background:var(--accent); color:#fff;
      border:none; padding:.65rem 1.5rem; border-radius:9px;
      font-family:'DM Sans',sans-serif; font-size:.9rem; font-weight:600;
      cursor:pointer; box-shadow:0 4px 20px rgba(230,57,70,.35);
      transition:.2s;
    }
    .btn-save:hover { transform:translateY(-1px); }
    .btn-export {
      background:var(--surface); color:var(--text);
      border:1px solid var(--border); padding:.65rem 1.2rem; border-radius:9px;
      font-family:'DM Sans',sans-serif; font-size:.9rem;
      cursor:pointer; transition:.2s;
    }
    .btn-export:hover { border-color:var(--muted); }

    .toast {
      position:fixed; bottom:5rem; left:50%; transform:translateX(-50%);
      background:var(--green); color:#fff;
      padding:.6rem 1.4rem; border-radius:8px; font-size:.85rem; font-weight:500;
      z-index:200; pointer-events:none;
      animation:toastAnim .3s ease;
      display:none;
    }
    @keyframes toastAnim {
      from { opacity:0; transform:translate(-50%,10px); }
      to   { opacity:1; transform:translate(-50%,0); }
    }

    footer {
      position:relative; z-index:1;
      text-align:center; padding:2rem;
      color:var(--muted); font-size:.78rem;
      border-top:1px solid var(--border);
      margin-top:3rem;
    }

    @media(max-width:600px) {
      header { padding:.8rem 1rem; }
      .hero h1 { font-size:2.2rem; }
      #home { padding:1.5rem 1rem; }
      .grid { grid-template-columns:1fr 1fr; gap:.75rem; }
      .modal { max-width:100%; max-height:100vh; border-radius:0; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">Marmik archive</div>
  <div class="header-right">
    <span class="count-badge" id="count-badge">0 videos</span>
    <button class="btn-small btn-admin" onclick="goAdmin()">⚙️ Admin</button>
  </div>
</header>

<!-- ══ HOME PAGE ══ -->
<div id="page-home" class="page active">
  <div id="home">
    <div class="hero">
      <h1>📺 Marmik archive</h1>
      <p>Telegram se seedha stream — apne web pe</p>
    </div>
    <div id="grid-container"></div>
  </div>
  <footer>Marmik archive • Telegram CDN Powered • @marmiik</footer>
</div>

<!-- ══ ADMIN PAGE ══ -->
<div id="page-admin" class="page">
  <div id="admin">
    <div class="admin-header">
      <button class="back-btn" onclick="goHome()">← Back</button>
      <h2>⚙️ Admin Panel</h2>
    </div>

    <!-- Upload zone -->
    <div class="upload-zone" id="drop-zone">
      <div class="uz-icon">📂</div>
      <h3>JSON Files Upload Karo</h3>
      <p>Bot se mili <strong>.json</strong> files yahan drop karo ya click karo<br>
         Multiple files ek saath select kar sakte ho</p>
      <input type="file" id="file-input" accept=".json" multiple onchange="handleFiles(this.files)"/>
    </div>

    <div class="uploaded-list">
      <h3>📋 Uploaded Posts (<span id="item-count">0</span>)</h3>
      <div id="items-list"></div>
    </div>
  </div>
</div>

<!-- ══ MODAL ══ -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal" id="modal-box">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">—</div>
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Save bar (only in admin) -->
<div class="save-bar" id="save-bar" style="display:none;">
  <button class="btn-export" onclick="exportJSON()">⬇️ Export JSON</button>
  <button class="btn-save" onclick="saveData()">💾 Save & Publish</button>
</div>

<script>
// ──────────────────────────────
//  STATE
// ──────────────────────────────
const STORAGE_KEY = 'ranaji_posts_v1';
let posts = [];

function loadPosts() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    posts = raw ? JSON.parse(raw) : [];
  } catch { posts = []; }
}

function savePosts() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(posts));
}

// ──────────────────────────────
//  ROUTING
// ──────────────────────────────
function getRoute() {
  return window.location.hash || '#home';
}

function goHome() {
  window.location.hash = '#home';
}

function goAdmin() {
  window.location.hash = '#ranaji';
}

window.addEventListener('hashchange', renderRoute);

function renderRoute() {
  const hash = getRoute();
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('save-bar').style.display = 'none';

  if (hash === '#ranaji') {
    document.getElementById('page-admin').classList.add('active');
    document.getElementById('save-bar').style.display = 'flex';
    renderAdminList();
  } else {
    document.getElementById('page-home').classList.add('active');
    renderGrid();
  }
}

// ──────────────────────────────
//  HOME GRID
// ──────────────────────────────
function renderGrid() {
  const container = document.getElementById('grid-container');
  const badge = document.getElementById('count-badge');
  badge.textContent = `${posts.length} item${posts.length !== 1 ? 's' : ''}`;

  if (posts.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="icon">📭</div>
        <h3>Koi content nahi mila</h3>
        <p>Admin panel mein JSON files upload karo<br>
           <strong>URL:</strong> <code>#ranaji</code> → ⚙️ Admin button</p>
      </div>`;
    return;
  }

  // Sort newest first
  const sorted = [...posts].sort((a,b) => (b.post_id||0) - (a.post_id||0));

  container.innerHTML = `<div class="grid">${sorted.map((p,i) => cardHTML(p,i)).join('')}</div>`;
}

function typeIcon(type) {
  if (type === 'video') return '🎬';
  if (type === 'pdf')   return '📄';
  if (type === 'photo') return '🖼️';
  return '📁';
}

function typeBadge(type) {
  if (type === 'video') return 'badge-video';
  if (type === 'pdf')   return 'badge-pdf';
  if (type === 'photo') return 'badge-photo';
  return 'badge-document';
}

function cardHTML(p, idx) {
  const title = p.caption || p.file_name || `Post #${p.post_id}`;
  const thumb = p.thumb
    ? `<img src="${p.thumb}" loading="lazy" onerror="this.style.display='none'">`
    : `<div class="type-icon">${typeIcon(p.type)}</div>`;

  return `
    <div class="card" onclick="openModal(${idx})">
      <div class="card-thumb">
        ${thumb}
        <span class="card-type-badge ${typeBadge(p.type)}">${p.type || 'file'}</span>
        ${p.type === 'video' ? '<div class="play-btn">▶</div>' : ''}
      </div>
      <div class="card-body">
        <div class="card-title">${escHtml(title)}</div>
        <div class="card-meta">
          <span>#${p.post_id || '—'}</span>
          ${p.duration ? `<span>⏱ ${formatDur(p.duration)}</span>` : ''}
          <span>@${p.channel || 'ranajoji'}</span>
        </div>
      </div>
    </div>`;
}

function formatDur(s) {
  const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = s%60;
  if (h) return `${h}:${pad(m)}:${pad(sec)}`;
  return `${m}:${pad(sec)}`;
}
function pad(n) { return String(n).padStart(2,'0'); }

// ──────────────────────────────
//  MODAL
// ──────────────────────────────
function openModal(idx) {
  const sorted = [...posts].sort((a,b) => (b.post_id||0) - (a.post_id||0));
  const p = sorted[idx];
  if (!p) return;

  document.getElementById('modal-title').textContent =
    p.caption || p.file_name || `Post #${p.post_id}`;

  let mediaHTML = '';

  if (p.type === 'video') {
    if (p.cdn_url) {
      mediaHTML = `
        <div class="player-wrap">
          <video controls autoplay playsinline preload="metadata">
            <source src="${p.cdn_url}" type="${p.mime_type || 'video/mp4'}">
            Tumhara browser video support nahi karta.
          </video>
        </div>`;
    } else if (p.tg_link) {
      // Large video — use Telegram embed
      const embedSrc = `https://t.me/${p.channel}/${p.post_id}?embed=1&mode=tme`;
      mediaHTML = `
        <div class="player-wrap">
          <iframe src="${embedSrc}" allowfullscreen allow="autoplay; fullscreen"></iframe>
        </div>
        <div class="media-error" style="margin-top:.75rem;">
          <p>⚠️ Video 20MB se bada hai — Telegram embed use ho raha hai.<br>
          Agar nahi chal raha toh Telegram pe dekho.</p>
        </div>`;
    } else {
      mediaHTML = `<div class="media-error"><p>❌ Video URL nahi mili. Bot se dobara JSON le lo.</p></div>`;
    }
  }
  else if (p.type === 'pdf') {
    if (p.cdn_url) {
      // Google Docs viewer for PDF CDN URL
      const gdocsUrl = `https://docs.google.com/viewer?url=${encodeURIComponent(p.cdn_url)}&embedded=true`;
      mediaHTML = `
        <div class="pdf-viewer">
          <iframe src="${gdocsUrl}" allowfullscreen></iframe>
        </div>`;
    } else if (p.tg_link) {
      const embedSrc = `https://t.me/${p.channel}/${p.post_id}?embed=1`;
      mediaHTML = `
        <div class="pdf-viewer">
          <iframe src="${embedSrc}"></iframe>
        </div>`;
    } else {
      mediaHTML = `<div class="media-error"><p>❌ PDF URL nahi mili.</p></div>`;
    }
  }
  else if (p.type === 'photo') {
    mediaHTML = p.cdn_url
      ? `<div style="text-align:center;"><img src="${p.cdn_url}" style="max-width:100%;border-radius:10px;"></div>`
      : `<div class="media-error"><p>❌ Photo URL nahi mili.</p></div>`;
  }
  else {
    mediaHTML = `
      <div class="media-error">
        <p>📁 Ye file browser mein nahi khulti.<br>
        Telegram pe jaake download karo.</p>
      </div>`;
  }

  const tgLink = p.tg_link || (p.channel ? `https://t.me/${p.channel}/${p.post_id}` : null);

  document.getElementById('modal-body').innerHTML = `
    ${mediaHTML}
    <div class="modal-meta">
      <div class="modal-meta-info">
        <strong>Post:</strong> #${p.post_id} &nbsp;|&nbsp;
        <strong>Type:</strong> ${p.type} &nbsp;|&nbsp;
        <strong>Channel:</strong> @${p.channel || 'ranajoji'}<br>
        ${p.file_name ? `<strong>File:</strong> ${escHtml(p.file_name)}` : ''}
      </div>
      ${tgLink ? `<a class="btn-tg" href="${tgLink}" target="_blank">✈️ Telegram pe dekho</a>` : ''}
    </div>`;

  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e.target === document.getElementById('modal')) closeModalDirect();
}
function closeModalDirect() {
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
  // Stop video/iframe
  const body = document.getElementById('modal-body');
  const video = body.querySelector('video');
  if (video) video.pause();
  const iframe = body.querySelector('iframe');
  if (iframe) iframe.src = iframe.src; // reset
}
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModalDirect(); });

// ──────────────────────────────
//  ADMIN
// ──────────────────────────────
function renderAdminList() {
  document.getElementById('item-count').textContent = posts.length;
  const list = document.getElementById('items-list');

  if (posts.length === 0) {
    list.innerHTML = `<div style="color:var(--muted);font-size:.85rem;padding:1rem 0;">
      Koi posts nahi hain. JSON files upload karo upar se.</div>`;
    return;
  }

  const sorted = [...posts].sort((a,b) => (b.post_id||0) - (a.post_id||0));
  list.innerHTML = sorted.map((p,i) => {
    const title = p.caption || p.file_name || `Post #${p.post_id}`;
    const iconClass = p.type === 'video' ? 'ji-video' : p.type === 'pdf' ? 'ji-pdf' : p.type === 'photo' ? 'ji-photo' : 'ji-doc';
    return `
      <div class="json-item" id="item-${p.post_id}">
        <div class="ji-icon ${iconClass}">${typeIcon(p.type)}</div>
        <div class="ji-info">
          <div class="ji-title" title="${escHtml(title)}">${escHtml(title.substring(0,80))}</div>
          <div class="ji-sub">#${p.post_id} • ${p.type} • @${p.channel||'?'} ${p.cdn_url ? '• ✅ CDN' : '• ⚠️ Large'}</div>
        </div>
        <div class="ji-actions">
          <button class="ji-del" onclick="deletePost(${p.post_id})">🗑️</button>
        </div>
      </div>`;
  }).join('');
}

function deletePost(postId) {
  posts = posts.filter(p => p.post_id !== postId);
  renderAdminList();
  document.getElementById('item-count').textContent = posts.length;
  showToast('Post remove hua!');
}

// ──────────────────────────────
//  FILE HANDLING
// ──────────────────────────────
const dropZone = document.getElementById('drop-zone');

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  handleFiles(e.dataTransfer.files);
});

function handleFiles(files) {
  let count = 0;
  const fileArr = Array.from(files);
  fileArr.forEach(file => {
    if (!file.name.endsWith('.json')) return;
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const data = JSON.parse(e.target.result);
        // Accept single object or array
        const items = Array.isArray(data) ? data : [data];
        items.forEach(item => {
          if (!item.post_id) return;
          // Remove duplicate
          posts = posts.filter(p => p.post_id !== item.post_id);
          posts.push(item);
          count++;
        });
        renderAdminList();
        showToast(`✅ ${count} post(s) load hua!`);
      } catch {
        showToast('❌ Invalid JSON file');
      }
    };
    reader.readAsText(file);
  });
}

// ──────────────────────────────
//  SAVE / EXPORT
// ──────────────────────────────
function saveData() {
  savePosts();
  renderGrid();
  showToast('✅ Saved & Published!');
}

function exportJSON() {
  const blob = new Blob([JSON.stringify(posts, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'ranaji_posts.json';
  a.click();
}

// ──────────────────────────────
//  UTILS
// ──────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => { t.style.display = 'none'; }, 3000);
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
