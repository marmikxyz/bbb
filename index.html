<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Test Series</title>
<style>
  :root {
    --paper: #F2F1EB;
    --paper-line: #DAD7C9;
    --card: #FBFAF6;
    --ink: #1E2430;
    --ink-soft: #5B6270;
    --graphite: #8A8B85;
    --pencil-fill: #2F3A4A;
    --pen-blue: #2C4E85;
    --pen-blue-dark: #1F3A66;
    --amber: #C77B1F;
    --pass: #2F6F4E;
    --pass-bg: #E4F0E8;
    --fail: #B23B3B;
    --fail-bg: #F6E6E3;
    --radius: 4px;
    --serif: 'Zilla Slab', Georgia, serif;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
    --mono: 'IBM Plex Mono', 'Courier New', monospace;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: var(--sans);
    color: var(--ink);
    background:
      repeating-linear-gradient(
        var(--paper),
        var(--paper) 27px,
        var(--paper-line) 28px
      );
    min-height: 100vh;
  }

  a { color: inherit; text-decoration: none; }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 28px;
    border-bottom: 2px solid var(--ink);
    background: var(--paper);
  }
  .brand {
    font-family: var(--serif);
    font-weight: 700;
    font-size: 22px;
    letter-spacing: 0.3px;
    display: flex;
    align-items: baseline;
    gap: 8px;
  }
  .brand .roll {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-soft);
    border: 1px solid var(--graphite);
    padding: 2px 6px;
    border-radius: var(--radius);
  }

  .wrap { max-width: 880px; margin: 0 auto; padding: 32px 24px 80px; }

  /* ---------- HOME ---------- */
  .section-label {
    font-family: var(--mono);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--ink-soft);
    margin: 0 0 14px;
  }

  .quiz-grid { display: grid; gap: 14px; }

  .quiz-card {
    background: var(--card);
    border: 1px solid var(--ink);
    border-radius: var(--radius);
    padding: 18px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    cursor: pointer;
    transition: transform 0.12s ease, box-shadow 0.12s ease;
    box-shadow: 3px 3px 0 rgba(30,36,48,0.08);
  }
  .quiz-card:hover { transform: translate(-2px, -2px); box-shadow: 5px 5px 0 rgba(30,36,48,0.12); }
  .quiz-card h3 { font-family: var(--serif); margin: 0 0 6px; font-size: 19px; }
  .quiz-meta { font-family: var(--mono); font-size: 12px; color: var(--ink-soft); display: flex; gap: 14px; }
  .quiz-card .go {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--pen-blue);
    border: 1px solid var(--pen-blue);
    padding: 8px 14px;
    border-radius: var(--radius);
    white-space: nowrap;
  }

  .empty-state {
    border: 1px dashed var(--graphite);
    border-radius: var(--radius);
    padding: 40px 20px;
    text-align: center;
    color: var(--ink-soft);
    font-family: var(--mono);
    font-size: 13px;
  }

  /* ---------- QUIZ PLAYER ---------- */
  .player-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 18px;
  }
  .timer {
    font-family: var(--mono);
    font-size: 20px;
    font-weight: 700;
    padding: 6px 14px;
    border: 2px solid var(--ink);
    border-radius: var(--radius);
    background: var(--card);
  }
  .timer.urgent { color: var(--fail); border-color: var(--fail); }

  .omr-strip {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 24px;
    padding: 12px;
    background: var(--card);
    border: 1px solid var(--paper-line);
    border-radius: var(--radius);
  }
  .omr-dot {
    width: 26px; height: 26px;
    border-radius: 50%;
    border: 1.5px solid var(--graphite);
    font-family: var(--mono);
    font-size: 11px;
    display: flex; align-items: center; justify-content: center;
    color: var(--ink-soft);
    cursor: pointer;
    background: transparent;
  }
  .omr-dot.answered { background: var(--pencil-fill); border-color: var(--pencil-fill); color: var(--paper); }
  .omr-dot.current { border-color: var(--amber); border-width: 2px; color: var(--amber); font-weight: 700; }

  .q-card {
    background: var(--card);
    border: 1px solid var(--ink);
    border-radius: var(--radius);
    padding: 28px;
    box-shadow: 4px 4px 0 rgba(30,36,48,0.08);
  }
  .q-number {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--pen-blue);
    margin-bottom: 8px;
  }
  .q-text { font-family: var(--serif); font-size: 20px; line-height: 1.4; margin: 0 0 24px; }

  .option-row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 10px;
    border-radius: var(--radius);
    cursor: pointer;
    border: 1px solid transparent;
  }
  .option-row:hover { background: rgba(44,78,133,0.06); }
  .option-row.selected { border-color: var(--pen-blue); background: rgba(44,78,133,0.08); }

  .bubble {
    width: 30px; height: 30px;
    border-radius: 50%;
    border: 2px solid var(--ink);
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 700;
  }
  .option-row.selected .bubble { background: var(--pencil-fill); color: var(--paper); border-color: var(--pencil-fill); }
  .option-text { font-size: 15.5px; }

  .player-nav {
    display: flex;
    justify-content: space-between;
    margin-top: 22px;
  }
  .btn {
    font-family: var(--mono);
    font-size: 13px;
    padding: 10px 20px;
    border-radius: var(--radius);
    border: 1.5px solid var(--ink);
    background: var(--card);
    cursor: pointer;
  }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn.primary { background: var(--ink); color: var(--paper); }
  .btn.submit { background: var(--pen-blue); border-color: var(--pen-blue); color: var(--paper); }

  /* ---------- RESULT ---------- */
  .score-banner {
    background: var(--card);
    border: 2px solid var(--ink);
    border-radius: var(--radius);
    padding: 28px;
    text-align: center;
    margin-bottom: 26px;
  }
  .score-num { font-family: var(--serif); font-size: 48px; font-weight: 700; }
  .score-sub { font-family: var(--mono); font-size: 13px; color: var(--ink-soft); margin-top: 6px; }

  .review-item {
    background: var(--card);
    border: 1px solid var(--paper-line);
    border-left: 4px solid var(--graphite);
    border-radius: var(--radius);
    padding: 18px 20px;
    margin-bottom: 12px;
  }
  .review-item.correct { border-left-color: var(--pass); }
  .review-item.incorrect { border-left-color: var(--fail); }
  .review-item.skipped { border-left-color: var(--amber); }
  .review-q { font-family: var(--serif); font-size: 16.5px; margin: 0 0 10px; }
  .review-opt { font-size: 14px; padding: 6px 10px; border-radius: var(--radius); margin-bottom: 4px; }
  .review-opt.correct-answer { background: var(--pass-bg); color: var(--pass); font-weight: 600; }
  .review-opt.wrong-answer { background: var(--fail-bg); color: var(--fail); font-weight: 600; }
  .review-explain { font-size: 13px; color: var(--ink-soft); margin-top: 10px; font-style: italic; }

  /* ---------- ADMIN ---------- */
  .admin-tabs { display: flex; gap: 8px; margin-bottom: 20px; }
  .admin-tab {
    font-family: var(--mono); font-size: 13px;
    padding: 8px 16px; border-radius: var(--radius);
    border: 1px solid var(--ink); cursor: pointer; background: var(--paper);
  }
  .admin-tab.active { background: var(--ink); color: var(--paper); }

  .dropzone {
    border: 2px dashed var(--graphite);
    border-radius: var(--radius);
    padding: 40px;
    text-align: center;
    color: var(--ink-soft);
    font-family: var(--mono);
    font-size: 13px;
    background: var(--card);
  }
  .dropzone.hover { border-color: var(--pen-blue); color: var(--pen-blue); }

  .field { margin-bottom: 14px; }
  .field label { display: block; font-family: var(--mono); font-size: 11px; text-transform: uppercase; color: var(--ink-soft); margin-bottom: 5px; }
  .field input, .field textarea, .field select {
    width: 100%; padding: 9px 11px; font-family: var(--sans); font-size: 14px;
    border: 1px solid var(--graphite); border-radius: var(--radius); background: var(--card);
  }
  .q-edit-block { border: 1px solid var(--paper-line); border-radius: var(--radius); padding: 16px; margin-bottom: 14px; background: var(--card); }
  .opt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .row-flex { display: flex; gap: 10px; }
  .row-flex > * { flex: 1; }

  .admin-quiz-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px; border: 1px solid var(--paper-line); border-radius: var(--radius);
    margin-bottom: 8px; background: var(--card);
  }
  .small-btn { font-family: var(--mono); font-size: 12px; padding: 5px 10px; border-radius: var(--radius); border: 1px solid var(--ink); background: var(--paper); cursor: pointer; }
  .small-btn.danger { border-color: var(--fail); color: var(--fail); }

  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--ink); color: var(--paper); padding: 10px 20px;
    border-radius: var(--radius); font-family: var(--mono); font-size: 13px;
    opacity: 0; pointer-events: none; transition: opacity 0.2s ease;
  }
  .toast.show { opacity: 1; }

  .lock-screen { max-width: 320px; margin: 120px auto; text-align: center; }
  .lock-screen input { text-align: center; letter-spacing: 3px; }

  @media (max-width: 600px) {
    .wrap { padding: 20px 14px 60px; }
    .opt-grid { grid-template-columns: 1fr; }
    .q-text { font-size: 18px; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">Test Series <span class="roll">MOCK-EXAM MODE</span></div>
  <div id="topbarRight" style="font-family: var(--mono); font-size:12px; color: var(--ink-soft);"></div>
</div>

<div class="wrap" id="app"></div>
<div class="toast" id="toast"></div>

<script>
/* ============================================================
   DATA LAYER
   ============================================================ */
const LS_KEY = 'quizAdminData_v1';
const ADMIN_PASS = 'letmein'; // change this before deploying

let QUIZZES = [];       // published, loaded from quizzes.json
let ADMIN_DRAFT = null; // working copy in localStorage for admin panel

async function loadPublished() {
  try {
    const res = await fetch('./quizzes.json', { cache: 'no-store' });
    if (!res.ok) throw new Error('not found');
    const data = await res.json();
    QUIZZES = data.quizzes || [];
  } catch (e) {
    QUIZZES = [];
  }
}

function loadAdminDraft() {
  const raw = localStorage.getItem(LS_KEY);
  if (raw) {
    try { return JSON.parse(raw); } catch (e) {}
  }
  return { quizzes: [] };
}
function saveAdminDraft(data) {
  localStorage.setItem(LS_KEY, JSON.stringify(data));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

/* ============================================================
   ROUTER
   ============================================================ */
window.addEventListener('hashchange', render);
window.addEventListener('DOMContentLoaded', async () => {
  await loadPublished();
  render();
});

function currentRoute() {
  const hash = location.hash.replace(/^#\/?/, '');
  const parts = hash.split('/').filter(Boolean);
  return parts; // e.g. [] , ['quiz','id'], ['result','id'], ['admin']
}

function render() {
  const parts = currentRoute();
  const app = document.getElementById('app');
  const topRight = document.getElementById('topbarRight');
  topRight.innerHTML = '<a href="#/">Home</a>';

  if (parts[0] === 'admin') {
    renderAdmin(app);
  } else if (parts[0] === 'quiz' && parts[1]) {
    renderQuizPlayer(app, parts[1]);
  } else if (parts[0] === 'result' && parts[1]) {
    renderResult(app, parts[1]);
  } else {
    renderHome(app);
  }
}

/* ============================================================
   HOME
   ============================================================ */
function renderHome(app) {
  if (!QUIZZES.length) {
    app.innerHTML = `
      <p class="section-label">Available Tests</p>
      <div class="empty-state">
        No quizzes published yet.<br/>
        Create one via the Telegram bot, then import + publish it from
        <a href="#/admin" style="color:var(--pen-blue);text-decoration:underline;">the admin panel</a>.
      </div>`;
    return;
  }
  app.innerHTML = `
    <p class="section-label">Available Tests</p>
    <div class="quiz-grid">
      ${QUIZZES.map(q => `
        <div class="quiz-card" onclick="location.hash='#/quiz/${q.id}'">
          <div>
            <h3>${escapeHtml(q.title)}</h3>
            <div class="quiz-meta">
              <span>📂 ${escapeHtml(q.category || 'General')}</span>
              <span>❓ ${q.questions.length} Qs</span>
              <span>⏱ ${q.duration_minutes} min</span>
            </div>
          </div>
          <div class="go">START →</div>
        </div>
      `).join('')}
    </div>`;
}

/* ============================================================
   QUIZ PLAYER
   ============================================================ */
let playerState = null; // { quiz, answers: [], current, secondsLeft, timerId }

function renderQuizPlayer(app, quizId) {
  const quiz = QUIZZES.find(q => q.id === quizId);
  if (!quiz) {
    app.innerHTML = `<div class="empty-state">Quiz not found. <a href="#/" style="color:var(--pen-blue);">Go home</a></div>`;
    return;
  }

  if (!playerState || playerState.quiz.id !== quizId) {
    playerState = {
      quiz,
      answers: new Array(quiz.questions.length).fill(null),
      current: 0,
      secondsLeft: quiz.duration_minutes * 60,
      timerId: null,
    };
    startTimer();
  }

  drawPlayer(app);
}

function startTimer() {
  clearInterval(playerState.timerId);
  playerState.timerId = setInterval(() => {
    playerState.secondsLeft--;
    updateTimerDisplay();
    if (playerState.secondsLeft <= 0) {
      clearInterval(playerState.timerId);
      submitQuiz();
    }
  }, 1000);
}

function updateTimerDisplay() {
  const el = document.getElementById('timerDisplay');
  if (!el) return;
  const m = Math.floor(playerState.secondsLeft / 60);
  const s = playerState.secondsLeft % 60;
  el.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  el.parentElement.classList.toggle('urgent', playerState.secondsLeft <= 30);
}

function drawPlayer(app) {
  const { quiz, current, answers } = playerState;
  const q = quiz.questions[current];
  const m = Math.floor(playerState.secondsLeft / 60);
  const s = playerState.secondsLeft % 60;

  app.innerHTML = `
    <div class="player-head">
      <div>
        <p class="section-label" style="margin-bottom:4px;">${escapeHtml(quiz.title)}</p>
      </div>
      <div class="timer ${playerState.secondsLeft <= 30 ? 'urgent' : ''}">
        <span id="timerDisplay">${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}</span>
      </div>
    </div>

    <div class="omr-strip">
      ${quiz.questions.map((_, i) => `
        <div class="omr-dot ${answers[i] !== null ? 'answered' : ''} ${i === current ? 'current' : ''}"
             onclick="jumpTo(${i})">${i + 1}</div>
      `).join('')}
    </div>

    <div class="q-card">
      <div class="q-number">QUESTION ${current + 1} OF ${quiz.questions.length}</div>
      <p class="q-text">${escapeHtml(q.text)}</p>
      ${q.options.map((opt, i) => `
        <div class="option-row ${answers[current] === i ? 'selected' : ''}" onclick="selectOption(${i})">
          <div class="bubble">${String.fromCharCode(65 + i)}</div>
          <div class="option-text">${escapeHtml(opt)}</div>
        </div>
      `).join('')}
    </div>

    <div class="player-nav">
      <button class="btn" onclick="prevQuestion()" ${current === 0 ? 'disabled' : ''}>← Previous</button>
      ${current === quiz.questions.length - 1
        ? `<button class="btn submit" onclick="submitQuiz()">Submit Test</button>`
        : `<button class="btn primary" onclick="nextQuestion()">Next →</button>`}
    </div>
  `;
}

function selectOption(i) {
  playerState.answers[playerState.current] = i;
  drawPlayer(document.getElementById('app'));
}
function jumpTo(i) {
  playerState.current = i;
  drawPlayer(document.getElementById('app'));
}
function nextQuestion() {
  if (playerState.current < playerState.quiz.questions.length - 1) {
    playerState.current++;
    drawPlayer(document.getElementById('app'));
  }
}
function prevQuestion() {
  if (playerState.current > 0) {
    playerState.current--;
    drawPlayer(document.getElementById('app'));
  }
}

function submitQuiz() {
  clearInterval(playerState.timerId);
  const key = `quizResult_${playerState.quiz.id}`;
  sessionStorage.setItem(key, JSON.stringify({
    answers: playerState.answers,
    timeTakenSec: playerState.quiz.duration_minutes * 60 - playerState.secondsLeft,
  }));
  location.hash = `#/result/${playerState.quiz.id}`;
}

/* ============================================================
   RESULT
   ============================================================ */
function renderResult(app, quizId) {
  const quiz = QUIZZES.find(q => q.id === quizId);
  const raw = sessionStorage.getItem(`quizResult_${quizId}`);
  if (!quiz || !raw) {
    app.innerHTML = `<div class="empty-state">No result found. <a href="#/" style="color:var(--pen-blue);">Go home</a></div>`;
    return;
  }
  const { answers, timeTakenSec } = JSON.parse(raw);

  let correctCount = 0, incorrectCount = 0, skippedCount = 0;
  quiz.questions.forEach((q, i) => {
    if (answers[i] === null) skippedCount++;
    else if (answers[i] === q.correct) correctCount++;
    else incorrectCount++;
  });

  const total = quiz.questions.length;
  const pct = Math.round((correctCount / total) * 100);
  const mins = Math.floor(timeTakenSec / 60), secs = timeTakenSec % 60;

  app.innerHTML = `
    <div class="score-banner">
      <div class="score-num">${correctCount} / ${total}</div>
      <div class="score-sub">${pct}% score &nbsp;·&nbsp; ${mins}m ${secs}s taken &nbsp;·&nbsp;
        <span style="color:var(--pass)">${correctCount} correct</span> &nbsp;
        <span style="color:var(--fail)">${incorrectCount} wrong</span> &nbsp;
        <span style="color:var(--amber)">${skippedCount} skipped</span>
      </div>
    </div>
    <p class="section-label">Answer Review</p>
    ${quiz.questions.map((q, i) => {
      const given = answers[i];
      const status = given === null ? 'skipped' : (given === q.correct ? 'correct' : 'incorrect');
      return `
        <div class="review-item ${status}">
          <p class="review-q">${i + 1}. ${escapeHtml(q.text)}</p>
          ${q.options.map((opt, oi) => {
            let cls = '';
            if (oi === q.correct) cls = 'correct-answer';
            else if (oi === given) cls = 'wrong-answer';
            return `<div class="review-opt ${cls}">${String.fromCharCode(65+oi)}) ${escapeHtml(opt)}</div>`;
          }).join('')}
          ${q.explanation ? `<div class="review-explain">💡 ${escapeHtml(q.explanation)}</div>` : ''}
        </div>
      `;
    }).join('')}
    <div style="text-align:center; margin-top:24px;">
      <a href="#/" class="btn primary">Back to Tests</a>
    </div>
  `;
}

/* ============================================================
   ADMIN
   ============================================================ */
let adminUnlocked = sessionStorage.getItem('adminUnlocked') === '1';
let adminTab = 'import';

function renderAdmin(app) {
  if (!adminUnlocked) {
    app.innerHTML = `
      <div class="lock-screen">
        <p class="section-label">Admin Access</p>
        <div class="field"><input type="password" id="passInput" placeholder="Passphrase" /></div>
        <button class="btn primary" style="width:100%;" onclick="tryUnlock()">Unlock</button>
      </div>`;
    document.getElementById('passInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') tryUnlock();
    });
    return;
  }

  if (!ADMIN_DRAFT) ADMIN_DRAFT = loadAdminDraft();

  app.innerHTML = `
    <p class="section-label">Admin Panel</p>
    <div class="admin-tabs">
      <div class="admin-tab ${adminTab==='import'?'active':''}" onclick="setAdminTab('import')">Import</div>
      <div class="admin-tab ${adminTab==='manual'?'active':''}" onclick="setAdminTab('manual')">New Quiz</div>
      <div class="admin-tab ${adminTab==='manage'?'active':''}" onclick="setAdminTab('manage')">Manage & Publish</div>
    </div>
    <div id="adminContent"></div>
  `;
  drawAdminTab();
}

function tryUnlock() {
  const val = document.getElementById('passInput').value;
  if (val === ADMIN_PASS) {
    adminUnlocked = true;
    sessionStorage.setItem('adminUnlocked', '1');
    renderAdmin(document.getElementById('app'));
  } else {
    showToast('Wrong passphrase');
  }
}

function setAdminTab(tab) { adminTab = tab; drawAdminTab(); }

function drawAdminTab() {
  const c = document.getElementById('adminContent');
  if (adminTab === 'import') drawImportTab(c);
  else if (adminTab === 'manual') drawManualTab(c);
  else drawManageTab(c);
}

/* ---- Import tab: drag & drop JSON from the bot ---- */
function drawImportTab(c) {
  c.innerHTML = `
    <div class="dropzone" id="dropzone">
      📂 Drag & drop the quiz JSON file(s) from the Telegram bot here<br/>
      <span style="font-size:11px;">or click to browse</span>
      <input type="file" id="fileInput" accept=".json" multiple style="display:none;" />
    </div>
  `;
  const zone = document.getElementById('dropzone');
  const input = document.getElementById('fileInput');
  zone.addEventListener('click', () => input.click());
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('hover'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('hover'));
  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.classList.remove('hover');
    handleFiles(e.dataTransfer.files);
  });
  input.addEventListener('change', () => handleFiles(input.files));
}

function handleFiles(files) {
  Array.from(files).forEach(file => {
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const quiz = JSON.parse(reader.result);
        if (!quiz.title || !Array.isArray(quiz.questions)) {
          showToast(`Skipped ${file.name}: not a valid quiz JSON`);
          return;
        }
        if (!quiz.id) quiz.id = `quiz-${Date.now()}`;
        ADMIN_DRAFT.quizzes = ADMIN_DRAFT.quizzes.filter(q => q.id !== quiz.id);
        ADMIN_DRAFT.quizzes.push(quiz);
        saveAdminDraft(ADMIN_DRAFT);
        showToast(`Imported "${quiz.title}"`);
        if (adminTab === 'manage') drawAdminTab();
      } catch (e) {
        showToast(`Skipped ${file.name}: invalid JSON`);
      }
    };
    reader.readAsText(file);
  });
}

/* ---- Manual tab: build a quiz by hand in the browser ---- */
let manualQuiz = { title: '', category: '', duration_minutes: 10, questions: [] };

function drawManualTab(c) {
  c.innerHTML = `
    <div class="row-flex">
      <div class="field"><label>Title</label><input id="mTitle" value="${escapeAttr(manualQuiz.title)}" /></div>
      <div class="field"><label>Category</label><input id="mCategory" value="${escapeAttr(manualQuiz.category)}" /></div>
      <div class="field"><label>Duration (min)</label><input id="mDuration" type="number" value="${manualQuiz.duration_minutes}" /></div>
    </div>
    <div id="mQuestions"></div>
    <button class="small-btn" onclick="addManualQuestion()">+ Add Question</button>
    <div style="margin-top:20px;">
      <button class="btn primary" onclick="saveManualQuiz()">Save to Draft</button>
    </div>
  `;
  document.getElementById('mTitle').addEventListener('input', e => manualQuiz.title = e.target.value);
  document.getElementById('mCategory').addEventListener('input', e => manualQuiz.category = e.target.value);
  document.getElementById('mDuration').addEventListener('input', e => manualQuiz.duration_minutes = Number(e.target.value));
  drawManualQuestions();
}

function addManualQuestion() {
  manualQuiz.questions.push({ text: '', options: ['','','',''], correct: 0, explanation: '' });
  drawManualQuestions();
}
function removeManualQuestion(i) {
  manualQuiz.questions.splice(i, 1);
  drawManualQuestions();
}
function drawManualQuestions() {
  const el = document.getElementById('mQuestions');
  el.innerHTML = manualQuiz.questions.map((q, i) => `
    <div class="q-edit-block">
      <div class="field"><label>Question ${i+1}</label><textarea rows="2" onchange="updateManualQ(${i},'text',this.value)">${escapeHtml(q.text)}</textarea></div>
      <div class="opt-grid">
        ${q.options.map((opt, oi) => `
          <div class="field">
            <label>Option ${String.fromCharCode(65+oi)}</label>
            <input value="${escapeAttr(opt)}" onchange="updateManualOpt(${i},${oi},this.value)" />
          </div>
        `).join('')}
      </div>
      <div class="row-flex">
        <div class="field">
          <label>Correct Answer</label>
          <select onchange="updateManualQ(${i},'correct',Number(this.value))">
            ${['A','B','C','D'].map((l,oi)=>`<option value="${oi}" ${q.correct===oi?'selected':''}>${l}</option>`).join('')}
          </select>
        </div>
        <div class="field"><label>Explanation (optional)</label><input value="${escapeAttr(q.explanation)}" onchange="updateManualQ(${i},'explanation',this.value)" /></div>
      </div>
      <button class="small-btn danger" onclick="removeManualQuestion(${i})">Remove Question</button>
    </div>
  `).join('') || `<p style="color:var(--ink-soft); font-family:var(--mono); font-size:13px;">No questions yet — click "+ Add Question".</p>`;
}
function updateManualQ(i, field, val) { manualQuiz.questions[i][field] = val; }
function updateManualOpt(i, oi, val) { manualQuiz.questions[i].options[oi] = val; }

function saveManualQuiz() {
  if (!manualQuiz.title || !manualQuiz.questions.length) {
    showToast('Add a title and at least one question first');
    return;
  }
  const slug = manualQuiz.title.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
  const quiz = { ...manualQuiz, id: `${slug}-${Date.now()}` };
  ADMIN_DRAFT.quizzes.push(quiz);
  saveAdminDraft(ADMIN_DRAFT);
  showToast(`Saved "${quiz.title}" to draft`);
  manualQuiz = { title: '', category: '', duration_minutes: 10, questions: [] };
  drawManualTab(document.getElementById('adminContent'));
}

/* ---- Manage tab: review draft, delete, export/publish ---- */
function drawManageTab(c) {
  const quizzes = ADMIN_DRAFT.quizzes || [];
  c.innerHTML = `
    <p style="font-family:var(--mono); font-size:12px; color:var(--ink-soft); margin-bottom:14px;">
      ${quizzes.length} quiz(zes) in your local draft. This draft only lives in this browser
      until you publish it.
    </p>
    ${quizzes.map((q, i) => `
      <div class="admin-quiz-row">
        <div>
          <strong>${escapeHtml(q.title)}</strong>
          <div style="font-family:var(--mono); font-size:11px; color:var(--ink-soft);">
            ${q.questions.length} Qs · ${q.duration_minutes} min · ${escapeHtml(q.category || 'General')}
          </div>
        </div>
        <button class="small-btn danger" onclick="deleteDraftQuiz(${i})">Delete</button>
      </div>
    `).join('') || `<p style="font-family:var(--mono); font-size:13px; color:var(--ink-soft);">Nothing here yet — import from the bot or add one manually.</p>`}

    <div style="margin-top:24px; padding-top:20px; border-top:1px solid var(--paper-line);">
      <p class="section-label">Publish</p>
      <p style="font-size:13px; color:var(--ink-soft); max-width:520px;">
        Click below to download <code>quizzes.json</code>, then commit/replace that file
        at the root of your GitHub repo and push. Vercel will redeploy automatically and
        every visitor will see the updated tests.
      </p>
      <button class="btn submit" onclick="exportQuizzes()">⬇ Download quizzes.json</button>
    </div>
  `;
}
function deleteDraftQuiz(i) {
  ADMIN_DRAFT.quizzes.splice(i, 1);
  saveAdminDraft(ADMIN_DRAFT);
  drawManageTab(document.getElementById('adminContent'));
}
function exportQuizzes() {
  const blob = new Blob([JSON.stringify({ quizzes: ADMIN_DRAFT.quizzes }, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'quizzes.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast('Downloaded quizzes.json — commit it to your repo');
}

/* ============================================================
   UTIL
   ============================================================ */
function escapeHtml(str) {
  return String(str ?? '').replace(/[&<>"']/g, m => ({
    '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'
  }[m]));
}
function escapeAttr(str) { return escapeHtml(str); }
</script>
